<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Recipe & Budget Meal Planner</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #fff0f5; --nav-color: #ffb7c5; --btn-grey: #d3d3d3; --text: #000; --border: #000; }
        body { font-family: sans-serif; display: flex; margin: 0; background: var(--bg); height: 100vh; color: var(--text); border: 2px solid var(--border); overflow: hidden; }
        nav { width: 180px; background: var(--nav-color); color: var(--text); padding: 15px; flex-shrink: 0; border-right: 2px solid var(--border); overflow-y: auto; }
        nav h2 { font-size: 1.2rem; margin-top: 0; }
        nav button, nav a { display: block; width: 100%; text-align: left; background: var(--btn-grey); color: var(--text); border: 2px solid var(--border); padding: 10px; margin-bottom: 10px; font-weight: bold; cursor: pointer; text-decoration: none; box-sizing: border-box; font-size: 0.9rem; }
        nav button:hover, nav a:hover { filter: brightness(90%); }
        #main-view { flex-grow: 1; padding: 30px; overflow-y: auto; }
        button { cursor: pointer; padding: 10px 15px; border: 2px solid var(--border); font-weight: bold; background: var(--btn-grey); margin: 5px; }
        button:hover { filter: brightness(90%); }
        input, select, textarea { padding: 10px; border: 2px solid var(--border); font-family: sans-serif; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--bg); padding: 30px; border: 4px solid var(--border); width: 90%; max-width: 400px; text-align: center; }
        .btn-container { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="country-modal" class="modal">
        <div class="modal-content" id="modal-content">
            <h2 style="margin-top: 0;">Welcome</h2>
            <p>Select your location and theme.</p>
            <select id="modal-country-select" style="width: 100%; margin-bottom: 15px;"></select>
            <select id="modal-color-select" onchange="previewTheme()" style="width: 100%; margin-bottom: 15px;">
                <option value="pink">Pink</option>
                <option value="blue">Blue</option>
                <option value="green">Green</option>
                <option value="darkgrey">Dark Grey</option>
                <option value="purple">Purple</option>
                <option value="orange">Orange</option>
                <option value="teal">Teal</option>
            </select>
            <button onclick="confirmCountry()" style="width: 100%; background: #000; color: #fff;">Enter App</button>
        </div>
    </div>

    <nav>
        <h2>Menu</h2>
        <div id="nav-counter" style="font-size: 0.85rem; font-weight: bold; color: #555; margin-bottom: 15px; border-bottom: 2px solid var(--border); padding-bottom: 10px;">🌍 Loading live recipes...</div>
        
        <button onclick="showPage('home')">Home</button>
        <button onclick="showPage('find-recipes')">Find Recipes</button>
        <button onclick="showPage('find-budget-meals')">Budget Meals</button>
        <button onclick="addRecipeMenu()" style="background: #fff; border: 2px dashed #000;">+ Add Recipe</button>
        <button onclick="showPage('add-budget-meal')" style="background: #fff; border: 2px dashed #000;">+ Add Budget Meal</button>
        
        <div style="margin-top: 20px; padding: 10px; background: #fff; border: 2px solid var(--border); font-size: 0.85rem; font-style: italic;">
            <strong>Kitchen Hack:</strong><br><span id="hack-text">Loading...</span>
        </div>

        <div style="margin-top: 30px; border-top: 2px solid var(--border); padding-top: 10px;">
            <a href="privacy.html" style="background: none; border: none; font-size: 0.75rem; text-decoration: underline; padding: 4px; margin: 0;">Privacy Policy</a>
            <a href="terms.html" style="background: none; border: none; font-size: 0.75rem; text-decoration: underline; padding: 4px; margin: 0;">Terms of Service</a>
            <a href="contact.html" style="background: none; border: none; font-size: 0.75rem; text-decoration: underline; padding: 4px; margin: 0;">Contact Us</a>
            <a href="admin.html" style="background: #000; color: #fff; border: none; font-size: 0.75rem; text-decoration: none; padding: 4px; margin-top: 10px; text-align: center;">Admin Login</a>
        </div>
    </nav>

    <div id="main-view"></div>

    <script src="app.js"></script>
</body>
</html>
