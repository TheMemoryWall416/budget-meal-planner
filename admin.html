<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; margin: 0; padding: 0; color: #333; }
        .container { max-width: 1000px; margin: 40px auto; padding: 20px; background: #fff; border: 2px solid #000; box-shadow: 5px 5px 0px #000; }
        h1 { border-bottom: 2px solid #000; padding-bottom: 10px; margin-top: 0; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border: 2px solid #000; box-sizing: border-box; font-size: 1rem; }
        button { background: #000; color: #fff; border: 2px solid #000; padding: 8px 16px; font-weight: bold; cursor: pointer; }
        button:hover { background: #333; }
        .btn-success { background: #28a745; color: white; border-color: #1e7e34; }
        .btn-success:hover { background: #218838; }
        .btn-danger { background: #dc3545; color: white; border-color: #bd2130; }
        .btn-danger:hover { background: #c82333; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #000; padding-bottom: 15px; }
        .nav-tabs button { background: #e0e0e0; color: #000; border: 2px solid #000; font-size: 1rem; }
        .nav-tabs button.active { background: #000; color: #fff; }
        .card { border: 2px solid #000; padding: 15px; margin-bottom: 15px; background: #fafafa; display: flex; justify-content: space-between; align-items: center; }
        .card-content { flex-grow: 1; }
        .card-actions { display: flex; gap: 10px; margin-left: 15px; }
        .card-title { font-weight: bold; font-size: 1.2rem; margin: 0 0 5px 0; }
        .meta { font-size: 0.85rem; color: #666; margin: 0; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .badge { padding: 3px 8px; font-size: 0.75rem; font-weight: bold; border: 1px solid #000; margin-left: 10px; background: #fff; }
    </style>
</head>
<body>

<div class="container" id="login-screen">
    <h1>Admin Login</h1>
    <p>Authorized personnel only.</p>
    <input type="email" id="admin-email" placeholder="Email Address">
    <input type="password" id="admin-password" placeholder="Password">
    <button onclick="loginAdmin()">Access Dashboard</button>
</div>

<div class="container" id="dashboard-screen" style="display: none;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1 style="margin: 0; border: none; padding: 0;">Command Center</h1>
        <button onclick="logoutAdmin()">Logout</button>
    </div>
    
    <div class="nav-tabs">
        <button id="tab-inbox" class="active" onclick="switchTab('inbox')">📥 Inbox & Reports</button>
        <button id="tab-review" onclick="switchTab('review')">⏳ New Recipe Queue</button>
        <button id="tab-library" onclick="switchTab('library')">📚 Manage Library</button>
    </div>

    <div id="view-inbox">
        <h2>User Messages & Reports</h2>
        <div id="messages-list">Loading...</div>
    </div>

    <div id="view-review" style="display: none;">
        <h2>Needs Approval</h2>
        <p style="margin-top:0; color:#555;">These recipes are currently live. Approve them to keep them, or Decline to delete them immediately.</p>
        <div id="review-list">Loading...</div>
    </div>

    <div id="view-library" style="display: none;">
        <h2>Approved Recipes</h2>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Search by recipe title..." onkeyup="if(event.key === 'Enter') searchLibrary()">
            <button onclick="searchLibrary()">Search</button>
        </div>
        <div id="library-list">Loading...</div>
    </div>
</div>

<script>
    const supabaseUrl = 'https://bvdgbodzrfhgpvxzuogs.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ2ZGdib2R6cmZoZ3B2eHp1b2dzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MjYxMzIsImV4cCI6MjA5NzMwMjEzMn0.C6jFxQmFQYnRjVK8V30mG4qTH3PtEWmVThiiSvr1tEw';
    const myDatabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    window.onload = async function() {
        const { data: { session } } = await myDatabase.auth.getSession();
        if (session) showDashboard();
    };

    async function loginAdmin() {
        const email = document.getElementById('admin-email').value;
        const password = document.getElementById('admin-password').value;
        const { data, error } = await myDatabase.auth.signInWithPassword({ email, password });
        if (error) alert("Login Failed: " + error.message);
        else showDashboard();
    }

    async function logoutAdmin() {
        await myDatabase.auth.signOut();
        document.getElementById('dashboard-screen').style.display = 'none';
        document.getElementById('login-screen').style.display = 'block';
    }

    function showDashboard() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard-screen').style.display = 'block';
        loadMessages();
    }

    function switchTab(tab) {
        document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
        document.getElementById(`tab-${tab}`).classList.add('active');
        
        document.getElementById('view-inbox').style.display = 'none';
        document.getElementById('view-review').style.display = 'none';
        document.getElementById('view-library').style.display = 'none';
        
        document.getElementById(`view-${tab}`).style.display = 'block';

        if (tab === 'inbox') loadMessages();
        else if (tab === 'review') loadReviewQueue();
        else if (tab === 'library') searchLibrary();
    }

    // --- 1. INBOX LOGIC ---
    async function loadMessages() {
        const list = document.getElementById('messages-list');
        list.innerHTML = "Loading messages...";
        const { data, error } = await myDatabase.from('messages').select('*').order('created_at', { ascending: false });
        
        if (error) { list.innerHTML = `<p>Error: ${error.message}</p>`; return; }
        if (data.length === 0) { list.innerHTML = `<p>Inbox is completely empty.</p>`; return; }

        let html = '<div style="display:flex; flex-direction:column; gap: 15px;">';
        data.forEach(msg => {
            const date = new Date(msg.created_at).toLocaleString();
            const isReport = msg.name.startsWith("REPORTED");
            const cardColor = isReport ? '#fff0f0' : '#fafafa';
            const border = isReport ? '2px solid #dc3545' : '2px solid #000';
            
            html += `
            <div class="card" id="msg-${msg.id}" style="background: ${cardColor}; border: ${border}; flex-direction: column; align-items: flex-start;">
                <div style="width: 100%; display: flex; justify-content: space-between; border-bottom: 1px solid #ccc; padding-bottom: 10px; margin-bottom: 10px;">
                    <div>
                        <p class="card-title">${msg.name} <span class="meta">(${msg.email})</span></p>
                        <p class="meta">${date}</p>
                    </div>
                    <button class="btn-danger" onclick="deleteRecord('messages', ${msg.id}, 'msg-${msg.id}')">Delete</button>
                </div>
                <p style="white-space: pre-wrap; margin: 0;">${msg.message}</p>
            </div>`;
        });
        html += '</div>';
        list.innerHTML = html;
    }

    // --- 2. REVIEW QUEUE LOGIC ---
    async function loadReviewQueue() {
        const list = document.getElementById('review-list');
        list.innerHTML = "Checking for new recipes...";
        const { data, error } = await myDatabase.from('meals').select('id, title, category, country').eq('status', 'pending').order('created_at', { ascending: false });
        
        if (error) { list.innerHTML = `<p>Error: ${error.message}</p>`; return; }
        if (data.length === 0) { list.innerHTML = `<p>Queue is empty! You are all caught up.</p>`; return; }

        let html = '';
        data.forEach(meal => {
            const typeInfo = meal.category === 'budget' ? `Budget Meal (${meal.country})` : `Global Recipe (${meal.category})`;
            html += `
            <div class="card" id="review-${meal.id}">
                <div class="card-content">
                    <p class="card-title">${meal.title} <span class="badge" style="color: #d39e00; border-color: #d39e00;">PENDING</span></p>
                    <p class="meta">Type: ${typeInfo} | ID: ${meal.id}</p>
                </div>
                <div class="card-actions">
                    <button class="btn-success" onclick="approveRecipe(${meal.id}, 'review-${meal.id}')">Approve</button>
                    <button class="btn-danger" onclick="deleteRecord('meals', ${meal.id}, 'review-${meal.id}')">Decline (Delete)</button>
                </div>
            </div>`;
        });
        list.innerHTML = html;
    }

    async function approveRecipe(id, elementId) {
        const { error } = await myDatabase.from('meals').update({ status: 'approved' }).eq('id', id);
        if (error) alert("Error approving: " + error.message);
        else document.getElementById(elementId).remove();
    }

    // --- 3. MANAGE LIBRARY LOGIC ---
    async function searchLibrary() {
        const term = document.getElementById('search-input') ? document.getElementById('search-input').value.trim() : '';
        const list = document.getElementById('library-list');
        list.innerHTML = "Loading library...";
        
        let query = myDatabase.from('meals').select('id, title, category, country, created_at').eq('status', 'approved').order('created_at', { ascending: false });
        
        if (term !== '') {
            query = query.ilike('title', `%${term}%`); 
        } else {
            query = query.limit(50); // Show only recent 50 to keep the page fast
        }

        const { data, error } = await query;
        
        if (error) { list.innerHTML = `<p>Error: ${error.message}</p>`; return; }
        if (data.length === 0) { list.innerHTML = `<p>No approved recipes found matching that search.</p>`; return; }

        let html = term === '' ? '<p class="meta" style="margin-bottom: 15px;">Showing most recent 50 approved recipes. Use search to find older ones.</p>' : '';
        data.forEach(meal => {
            const typeInfo = meal.category === 'budget' ? `Budget Meal (${meal.country})` : `Global Recipe (${meal.category})`;
            html += `
            <div class="card" id="lib-${meal.id}">
                <div class="card-content">
                    <p class="card-title">${meal.title} <span class="badge" style="color: #28a745; border-color: #28a745;">APPROVED</span></p>
                    <p class="meta">Type: ${typeInfo} | ID: ${meal.id}</p>
                </div>
                <div class="card-actions">
                    <button class="btn-danger" onclick="deleteRecord('meals', ${meal.id}, 'lib-${meal.id}')">Delete</button>
                </div>
            </div>`;
        });
        list.innerHTML = html;
    }

    // --- GLOBAL DELETE LOGIC ---
    async function deleteRecord(table, id, elementId) {
        if (!confirm("Are you 100% sure you want to permanently delete this? It cannot be undone.")) return;
        const { error } = await myDatabase.from(table).delete().eq('id', id);
        if (error) alert("Error deleting: " + error.message);
        else document.getElementById(elementId).remove();
    }
</script>
</body>
</html>
