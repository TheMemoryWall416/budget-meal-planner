<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; margin: 0; padding: 0; color: #333; }
        .container { max-width: 1000px; margin: 40px auto; padding: 20px; background: #fff; border: 2px solid #000; box-shadow: 5px 5px 0px #000; }
        h1 { border-bottom: 2px solid #000; padding-bottom: 10px; margin-top: 0; }
        input, textarea, select { width: 100%; padding: 10px; margin-bottom: 15px; border: 2px solid #000; box-sizing: border-box; font-size: 1rem; font-family: sans-serif; }
        button { background: #000; color: #fff; border: 2px solid #000; padding: 8px 16px; font-weight: bold; cursor: pointer; }
        button:hover { background: #333; }
        .btn-success { background: #28a745; color: white; border-color: #1e7e34; }
        .btn-success:hover { background: #218838; }
        .btn-danger { background: #dc3545; color: white; border-color: #bd2130; }
        .btn-danger:hover { background: #c82333; }
        .btn-edit { background: #ffc107; color: #000; border-color: #d39e00; }
        .btn-edit:hover { background: #e0a800; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #000; padding-bottom: 15px; }
        .nav-tabs button { background: #e0e0e0; color: #000; border: 2px solid #000; font-size: 1rem; }
        .nav-tabs button.active { background: #000; color: #fff; }
        .card { border: 2px solid #000; padding: 15px; margin-bottom: 15px; background: #fafafa; display: flex; justify-content: space-between; align-items: center; }
        .card-content { flex-grow: 1; }
        .card-actions { display: flex; gap: 10px; margin-left: 15px; }
        .card-title { font-weight: bold; font-size: 1.2rem; margin: 0 0 5px 0; }
        .meta { font-size: 0.85rem; color: #666; margin: 0; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .badge { padding: 3px 8px; font-size: 0.75rem; font-weight: bold; border: 1px solid #000; margin-left: 10px; background: #fff; }
        .badge-special { background: #fff3cd; color: #856404; border-color: #ffeeba; }
        .badge-plan { background: #cce5ff; color: #004085; border-color: #b8daff; }
        .badge-pet { background: #e2d9f3; color: #381885; border-color: #d2c4eb; }
    </style>
</head>
<body>

<div class="container" id="login-screen">
    <h1>Admin Login</h1>
    <p>Authorized personnel only.</p>
    <input type="email" id="admin-email" placeholder="Email Address">
    <input type="password" id="admin-password" placeholder="Password">
    <button onclick="loginAdmin()">Access Dashboard</button>
</div>

<div class="container" id="dashboard-screen" style="display: none;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1 style="margin: 0; border: none; padding: 0;">Command Center</h1>
        <button onclick="logoutAdmin()">Logout</button>
    </div>
    
    <div class="nav-tabs">
        <button id="tab-inbox" class="active" onclick="switchTab('inbox')">📥 Inbox & Reports</button>
        <button id="tab-review" onclick="switchTab('review')">⏳ New Recipe Queue</button>
        <button id="tab-library" onclick="switchTab('library')">📚 Manage Library</button>
    </div>

    <div id="view-inbox">
        <h2>User Messages & Reports</h2>
        <div id="messages-list">Loading...</div>
    </div>

    <div id="view-review" style="display: none;">
        <h2>Needs Approval</h2>
        <p style="margin-top:0; color:#555;">These items are currently live. Approve them to keep them, or Decline to delete them immediately.</p>
        <div id="review-list">Loading...</div>
    </div>

    <div id="view-library" style="display: none;">
        <h2>Approved Content</h2>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Search by title..." onkeyup="if(event.key === 'Enter') searchLibrary()">
            <select id="filter-category" onchange="searchLibrary()" style="width: auto; margin-bottom: 0; cursor: pointer;">
                <option value="all">All Categories</option>
                <option value="budget">Budget Meals</option>
                <option value="special">Local Specials</option>
                <option value="7-Day Meal Plans">7-Day Meal Plans</option>
                <option value="Pet Food & Treats">Pet Food & Treats</option>
            </select>
            <button onclick="searchLibrary()">Search</button>
        </div>
        <div id="library-list">Loading...</div>
    </div>

    <div id="view-edit" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2 style="margin: 0;">Edit Record</h2>
            <button onclick="switchTab('library')" style="background: #e0e0e0; color: #000;">Cancel & Return</button>
        </div>
        
        <input type="hidden" id="edit-id">
        
        <label style="font-weight: bold; font-size: 0.9rem;">Recipe Title</label>
        <input type="text" id="edit-title" placeholder="Recipe Title">
        
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <div style="flex: 1;">
                <label style="font-weight: bold; font-size: 0.9rem;">Category</label>
                <input type="text" id="edit-category" oninput="toggleAdminFields()" placeholder="e.g. budget, Breakfast" style="margin-bottom: 0;">
            </div>
            <div style="flex: 1;">
                <label style="font-weight: bold; font-size: 0.9rem;">Country</label>
                <input type="text" id="edit-country" placeholder="e.g. South Africa" style="margin-bottom: 0;">
            </div>
        </div>

        <label style="font-weight: bold; font-size: 0.9rem;">Meal Type (Crucial for Budget Meals)</label>
        <select id="edit-meal-type" onchange="toggleAdminFields()">
            <option value="">Global Recipe (No specific type)</option>
            <option value="home">Home-Cooked (Uses Ingredients)</option>
            <option value="takeaway">Takeaway (No Ingredients)</option>
        </select>
        
        <div id="edit-budget-fields" style="display:none; gap: 10px; margin-bottom: 15px;">
            <div style="flex:1;">
                <label style="font-weight: bold; font-size: 0.9rem;">Total Cost</label>
                <input type="number" id="edit-cost" placeholder="Cost" step="any" style="margin-bottom: 0;">
            </div>
            <div style="flex:1;">
                <label style="font-weight: bold; font-size: 0.9rem;">Servings</label>
                <input type="number" id="edit-servings" placeholder="Servings" style="margin-bottom: 0;">
            </div>
        </div>

        <div id="edit-ingredients-container" style="background: #fff; border: 2px solid #000; padding: 15px; margin-bottom: 15px;">
            <h3 style="margin-top: 0;">Ingredients</h3>
            <div id="edit-ingredients-list"></div>
            <button onclick="adminAddIngredientRow()" style="margin-top: 10px; background: #e0e0e0; color: #000; border: 1px solid #000; padding: 5px 10px; font-size: 0.8rem;">+ Add Ingredient Row</button>
        </div>
        
        <label style="font-weight: bold; font-size: 0.9rem;">Instructions / What is Included</label>
        <textarea id="edit-instructions" rows="8" placeholder="Instructions..."></textarea>
        
        <button class="btn-success" onclick="saveEdit()" style="width: 100%; font-size: 1.1rem; padding: 15px;">💾 Save Changes to Database</button>
    </div>
</div>

<script>
    const supabaseUrl = 'https://bvdgbodzrfhgpvxzuogs.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ2ZGdib2R6cmZoZ3B2eHp1b2dzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MjYxMzIsImV4cCI6MjA5NzMwMjEzMn0.C6jFxQmFQYnRjVK8V30mG4qTH3PtEWmVThiiSvr1tEw';
    const myDatabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    window.onload = async function() {
        const { data: { session } } = await myDatabase.auth.getSession();
        if (session) showDashboard();
    };

    async function loginAdmin() {
        const email = document.getElementById('admin-email').value;
        const password = document.getElementById('admin-password').value;
        const { data, error } = await myDatabase.auth.signInWithPassword({ email, password });
        if (error) alert("Login Failed: " + error.message);
        else showDashboard();
    }

    async function logoutAdmin() {
        await myDatabase.auth.signOut();
        document.getElementById('dashboard-screen').style.display = 'none';
        document.getElementById('login-screen').style.display = 'block';
    }

    function showDashboard() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard-screen').style.display = 'block';
        loadMessages();
    }

    function switchTab(tab) {
        document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
        if (document.getElementById(`tab-${tab}`)) {
            document.getElementById(`tab-${tab}`).classList.add('active');
        }
        
        document.getElementById('view-inbox').style.display = 'none';
        document.getElementById('view-review').style.display = 'none';
        document.getElementById('view-library').style.display = 'none';
        document.getElementById('view-edit').style.display = 'none';
        
        if (document.getElementById(`view-${tab}`)) {
            document.getElementById(`view-${tab}`).style.display = 'block';
        }

        if (tab === 'inbox') loadMessages();
        else if (tab === 'review') loadReviewQueue();
        else if (tab === 'library') searchLibrary();
    }

    // --- 1. INBOX LOGIC ---
    async function loadMessages() {
        const list = document.getElementById('messages-list');
        list.innerHTML = "Loading messages...";
        const { data, error } = await myDatabase.from('messages').select('*').order('created_at', { ascending: false });
        
        if (error) { list.innerHTML = `<p>Error: ${error.message}</p>`; return; }
        if (data.length === 0) { list.innerHTML = `<p>Inbox is completely empty.</p>`; return; }

        let html = '<div style="display:flex; flex-direction:column; gap: 15px;">';
        data.forEach(msg => {
            const date = new Date(msg.created_at).toLocaleString();
            const isReport = msg.name.startsWith("REPORTED");
            const cardColor = isReport ? '#fff0f0' : '#fafafa';
            const border = isReport ? '2px solid #dc3545' : '2px solid #000';
            
            html += `
            <div class="card" id="msg-${msg.id}" style="background: ${cardColor}; border: ${border}; flex-direction: column; align-items: flex-start;">
                <div style="width: 100%; display: flex; justify-content: space-between; border-bottom: 1px solid #ccc; padding-bottom: 10px; margin-bottom: 10px;">
                    <div>
                        <p class="card-title">${msg.name} <span class="meta">(${msg.email})</span></p>
                        <p class="meta">${date}</p>
                    </div>
                    <button class="btn-danger" onclick="deleteRecord('messages', ${msg.id}, 'msg-${msg.id}')">Delete</button>
                </div>
                <p style="white-space: pre-wrap; margin: 0;">${msg.message}</p>
            </div>`;
        });
        html += '</div>';
        list.innerHTML = html;
    }

    // --- 2. REVIEW QUEUE LOGIC ---
    async function loadReviewQueue() {
        const list = document.getElementById('review-list');
        list.innerHTML = "Checking for new submissions...";
        const { data, error } = await myDatabase.from('meals').select('id, title, category, country').eq('status', 'pending').order('created_at', { ascending: false });
        
        if (error) { list.innerHTML = `<p>Error: ${error.message}</p>`; return; }
        if (data.length === 0) { list.innerHTML = `<p>Queue is empty! You are all caught up.</p>`; return; }

        let html = '';
        data.forEach(meal => {
            let badgeStyle = '';
            let typeInfo = `Global Recipe (${meal.category})`;
            
            if (meal.category === 'budget') {
                typeInfo = `Budget Meal (${meal.country})`;
            } else if (meal.category === 'special') {
                badgeStyle = 'badge-special';
                typeInfo = `Local Special (${meal.country})`;
            } else if (meal.category === '7-Day Meal Plans') {
                badgeStyle = 'badge-plan';
                typeInfo = `Meal Plan (Global)`;
            } else if (meal.category === 'Pet Food & Treats') {
                badgeStyle = 'badge-pet';
                typeInfo = `Pet Food (Global)`;
            }

            html += `
            <div class="card" id="review-${meal.id}">
                <div class="card-content">
                    <p class="card-title">${meal.title} <span class="badge ${badgeStyle}">PENDING</span></p>
                    <p class="meta">Type: ${typeInfo} | ID: ${meal.id}</p>
                </div>
                <div class="card-actions">
                    <button class="btn-success" onclick="approveRecipe(${meal.id}, 'review-${meal.id}')">Approve</button>
                    <button class="btn-edit" onclick="openEdit(${meal.id})">Edit</button>
                    <button class="btn-danger" onclick="deleteRecord('meals', ${meal.id}, 'review-${meal.id}')">Decline</button>
                </div>
            </div>`;
        });
        list.innerHTML = html;
    }

    async function approveRecipe(id, elementId) {
        const { error } = await myDatabase.from('meals').update({ status: 'approved' }).eq('id', id);
        if (error) alert("Error approving: " + error.message);
        else document.getElementById(elementId).remove();
    }

    // --- 3. MANAGE LIBRARY LOGIC ---
    async function searchLibrary() {
        const term = document.getElementById('search-input') ? document.getElementById('search-input').value.trim() : '';
        const filterCat = document.getElementById('filter-category') ? document.getElementById('filter-category').value : 'all';
        const list = document.getElementById('library-list');
        list.innerHTML = "Loading library...";
        
        let query = myDatabase.from('meals').select('id, title, category, country, created_at').eq('status', 'approved').order('created_at', { ascending: false });
        
        if (filterCat !== 'all') {
            query = query.eq('category', filterCat);
        }

        if (term !== '') {
            query = query.ilike('title', `%${term}%`); 
        } else {
            query = query.limit(50);
        }

        const { data, error } = await query;
        
        if (error) { list.innerHTML = `<p>Error: ${error.message}</p>`; return; }
        if (data.length === 0) { list.innerHTML = `<p>No approved content found matching that search.</p>`; return; }

        let html = term === '' && filterCat === 'all' ? '<p class="meta" style="margin-bottom: 15px;">Showing most recent 50 approved items. Use search to find older ones.</p>' : '';
        data.forEach(meal => {
            let typeInfo = `Global Recipe (${meal.category})`;
            if (meal.category === 'budget') typeInfo = `Budget Meal (${meal.country})`;
            if (meal.category === 'special') typeInfo = `Local Special (${meal.country})`;
            if (meal.category === '7-Day Meal Plans') typeInfo = `Meal Plan (Global)`;
            if (meal.category === 'Pet Food & Treats') typeInfo = `Pet Food (Global)`;

            html += `
            <div class="card" id="lib-${meal.id}">
                <div class="card-content">
                    <p class="card-title">${meal.title} <span class="badge" style="color: #28a745; border-color: #28a745;">APPROVED</span></p>
                    <p class="meta">Type: ${typeInfo} | ID: ${meal.id}</p>
                </div>
                <div class="card-actions">
                    <button class="btn-edit" onclick="openEdit(${meal.id})">Edit</button>
                    <button class="btn-danger" onclick="deleteRecord('meals', ${meal.id}, 'lib-${meal.id}')">Delete</button>
                </div>
            </div>`;
        });
        list.innerHTML = html;
    }

    // --- 4. THE FULL EDIT LOGIC ---
    async function openEdit(id) {
        switchTab('edit'); 
        document.getElementById('edit-ingredients-list').innerHTML = 'Loading record data...';
        
        const { data, error } = await myDatabase.from('meals').select('*').eq('id', id).single();
        if (error) { alert("Error loading recipe: " + error.message); return; }

        document.getElementById('edit-id').value = data.id;
        document.getElementById('edit-title').value = data.title || '';
        document.getElementById('edit-category').value = data.category || '';
        document.getElementById('edit-country').value = data.country || '';
        document.getElementById('edit-meal-type').value = data.meal_type || '';
        document.getElementById('edit-cost').value = data.cost || '';
        document.getElementById('edit-servings').value = data.servings || '';
        document.getElementById('edit-instructions').value = data.recipe || '';

        toggleAdminFields();

        const ingList = document.getElementById('edit-ingredients-list');
        ingList.innerHTML = ''; 
        if (data.ingredients && Array.isArray(data.ingredients)) {
            data.ingredients.forEach(ing => {
                adminAddIngredientRow(ing.item, ing.qty, ing.unit);
            });
        }
        adminAddIngredientRow(); 
    }

    function toggleAdminFields() {
        const cat = document.getElementById('edit-category').value.toLowerCase();
        const mealType = document.getElementById('edit-meal-type').value;

        if (cat === 'budget') {
            document.getElementById('edit-budget-fields').style.display = 'flex';
        } else {
            document.getElementById('edit-budget-fields').style.display = 'none';
        }

        if (mealType === 'takeaway') {
            document.getElementById('edit-ingredients-container').style.display = 'none';
        } else {
            document.getElementById('edit-ingredients-container').style.display = 'block';
        }
    }

    function adminAddIngredientRow(name = '', qty = '', unit = '') {
        const list = document.getElementById('edit-ingredients-list');
        const row = document.createElement('div');
        row.className = 'ingredient-row';
        row.style.display = 'flex';
        row.style.gap = '5px';
        row.style.marginBottom = '8px';
        
        const safeQty = (qty !== null && qty !== undefined) ? qty : '';
        
        row.innerHTML = `
            <input type="text" class="ing-name" placeholder="Item Name (e.g. Flour)" value="${name.replace(/"/g, '&quot;')}" style="flex: 2; margin: 0; padding: 8px;">
            <input type="number" step="any" class="ing-qty" placeholder="Qty" value="${safeQty}" style="flex: 1; margin: 0; padding: 8px;">
            <input type="text" class="ing-unit" placeholder="Unit (e.g. cup, g)" value="${unit.replace(/"/g, '&quot;')}" style="flex: 1; margin: 0; padding: 8px;">
            <button onclick="this.parentElement.remove()" style="margin: 0; background: #dc3545; color: #fff; padding: 0 10px; border: 2px solid #bd2130;">X</button>
        `;
        list.appendChild(row);
    }

    async function saveEdit() {
        const id = document.getElementById('edit-id').value;
        const title = document.getElementById('edit-title').value.trim();
        const category = document.getElementById('edit-category').value.trim();
        const country = document.getElementById('edit-country').value.trim();
        const mealType = document.getElementById('edit-meal-type').value;
        const instructions = document.getElementById('edit-instructions').value.trim();
        
        if (!title || !instructions) return alert("Title and Instructions cannot be empty.");

        let structuredIngredients = null;

        if (mealType !== 'takeaway') {
            structuredIngredients = [];
            const rows = document.querySelectorAll('#edit-ingredients-list .ingredient-row');
            rows.forEach(row => {
                const name = row.querySelector('.ing-name').value.trim();
                const qtyRaw = row.querySelector('.ing-qty').value;
                const unit = row.querySelector('.ing-unit').value.trim();
                
                if (name !== "") {
                    structuredIngredients.push({ 
                        item: name, 
                        qty: qtyRaw !== '' ? parseFloat(qtyRaw) : null, 
                        unit: unit 
                    });
                }
            });
        }

        let updatePayload = {
            title: title,
            category: category,
            country: country,
            meal_type: mealType === "" ? null : mealType,
            recipe: instructions,
            ingredients: structuredIngredients
        };

        if (category.toLowerCase() === 'budget') {
            updatePayload.cost = parseFloat(document.getElementById('edit-cost').value);
            updatePayload.servings = parseInt(document.getElementById('edit-servings').value);
        } else {
            updatePayload.cost = null;
            updatePayload.servings = null;
        }

        const { error } = await myDatabase.from('meals').update(updatePayload).eq('id', id);
        
        if (error) {
            alert("Error saving update: " + error.message);
        } else {
            alert("Record updated successfully!");
            document.getElementById('view-edit').style.display = 'none';
            document.getElementById('view-library').style.display = 'block';
            searchLibrary(); 
        }
    }

    // --- GLOBAL DELETE LOGIC ---
    async function deleteRecord(table, id, elementId) {
        if (!confirm("Are you 100% sure you want to permanently delete this? It cannot be undone.")) return;
        const { error } = await myDatabase.from(table).delete().eq('id', id);
        if (error) alert("Error deleting: " + error.message);
        else if (elementId !== 'none' && document.getElementById(elementId)) {
            document.getElementById(elementId).remove();
        } else {
            // Fallback reload if it was deleted from a view that requires refreshing
            location.reload();
        }
    }
</script>
</body>
</html>
